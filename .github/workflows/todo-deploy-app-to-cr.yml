name: Auth Service — CI/CD

on:
  push:
    branches: [TODO]
    paths:
      - 'services/auth-service/**'
      - 'shared/**'
      - '.github/workflows/deploy-auth-service.yml'
  pull_request:
    branches: [TODO]
    paths:
      - 'services/auth-service/**'
      - 'shared/**'

env:
  SERVICE: auth-service
  IMAGE_NAME: ${{ secrets.REGISTRY_URL }}/auth-service

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Run tests
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint 'services/auth-service/src/**/*.js' 'shared/**/*.js'

      - name: Unit tests
        run: npm run test:unit --workspace=services/auth-service

      - name: Integration tests
        run: npm run test:integration --workspace=services/auth-service

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: auth-coverage
          path: services/auth-service/coverage/

  # ─────────────────────────────────────────────
  # JOB 2 — Build & push image (main only)
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 — Request deployment approval
  # ─────────────────────────────────────────────
  request-approval:
    name: Request Deployment Approval
    needs: build
    runs-on: ubuntu-latest
    environment:
      # ← configure required reviewers here in GitHub Settings
      name: production

    steps:
      - name: Approval gate
        run: echo "✅ Approved — deploying auth-service ${{ needs.build.outputs.image_tag }}"

  # ─────────────────────────────────────────────
  # JOB 4 — Deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [build, request-approval]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy auth-service
        run: |
          echo "🚀 Deploying ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          # ── Replace with your deploy command, for example: ────────────────
          # kubectl set image deployment/auth-service \
          #   auth-service=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          #
          # Or for docker-compose on a remote host:
          # ssh ${{ secrets.DEPLOY_HOST }} \
          #   "docker pull ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} && \
          #    docker-compose -f /app/docker-compose.yml up -d auth-service"
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}          # if using Kubernetes
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}        # if using SSH deploy
